# `docker-compose.local.yml` defines services that must be run locally
# to support a fully self-contained local development environment.

services:
  wiremock:
    ports:
      - '9091:8080'
    environment:
      WIREMOCK_HMPPS_AUTH_URL: http://hmpps-auth:9090
      WIREMOCK_AAP_API_URL: http://aap-api:8080
      WIREMOCK_COORDINATOR_API_URL: http://coordinator-api:8080
      WIREMOCK_HANDOVER_URL: http://arns-handover:7070
      WIREMOCK_TOKEN_VERIFICATION_URL: http://token-verification:8080
      WIREMOCK_DELIUS_URL: http://delius-api:8080
    command: --global-response-templating

  aap-ui:
    build:
      target: development
    command: npm run start:dev
    volumes:
      - ../:/app:cached
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NODE_CLUSTER_ENABLED: false
      ENVIRONMENT_NAME: dev
      HMPPS_AUTH_URL: http://wiremock:8080/auth
      HMPPS_AUTH_EXTERNAL_URL: http://localhost:9090/auth
      HMPPS_ARNS_HANDOVER_URL: http://wiremock:8080/handover
      HMPPS_ARNS_HANDOVER_EXTERNAL_URL: http://localhost:7070
      AAP_API_URL: http://wiremock:8080/aap-api
      COORDINATOR_API_URL: http://wiremock:8080/coordinator-api
      TOKEN_VERIFICATION_API_URL: http://wiremock:8080/verification
      TOKEN_VERIFICATION_ENABLED: true
      DELIUS_API_URL: http://wiremock:8080/delius
      INGRESS_URL: http://localhost:3000
      FEATURE_FLAG_URL: https://feature-toggles-dev.hmpps.service.justice.gov.uk
      OASYS_URL: http://localhost:3000/training-session-launcher/sessions
      MPOP_URL: http://localhost:3000/sign-in
      SAN_URL: http://localhost:7072

  arns-handover:
    environment:
      OASYS_RETURN_URLS: http://localhost:3000
      CLIENT_SP_OAUTH_REDIRECT_URI: http://localhost:3000/sign-in/handover/callback
      CLIENT_SP_HANDOVER_REDIRECT_URI: http://localhost:3000/sign-in/handover?service=sentence-plan
      CLIENT_SAN_OAUTH_REDIRECT_URI: http://localhost:3000/sign-in/handover/callback
      CLIENT_SAN_HANDOVER_REDIRECT_URI: http://localhost:3000/sign-in/handover?service=strengths-and-needs

  postgres:
    ports:
      - '5432:5432'

volumes:
  node_modules:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_node_modules
