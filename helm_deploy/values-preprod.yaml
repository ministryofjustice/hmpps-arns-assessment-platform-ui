---
# Per environment values which override defaults in hmpps-arns-assessment-platform-ui/values.yaml

generic-service:
  ingress:
    host: arns-assessment-platform-preprod.hmpps.service.justice.gov.uk
    modsecurity_enabled: true
    modsecurity_audit_enabled: true
    modsecurity_snippet: |
      SecRuleEngine DetectionOnly
      # Team here grants access to the OpenSearch logs to delve into the cause of the blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-assessments,tag:namespace={{ .Release.Namespace }}"
      # Disables request body scanning so free-text form fields (goal titles, step descriptions) do not trigger false positives
      SecRuleUpdateTargetById 920272 "!REQUEST_BODY"
      # Change default denial to be a 406 so that we can tell easily that it is modsecurity doing the blocking
      SecRuleUpdateActionById 949110 "deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "deny,status:406,logdata:%{SERVER_NAME}"
      SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"

  env:
    INGRESS_URL: 'https://arns-assessment-platform-preprod.hmpps.service.justice.gov.uk'
    HMPPS_AUTH_URL: 'https://sign-in-preprod.hmpps.service.justice.gov.uk/auth'
    HMPPS_ARNS_HANDOVER_URL: 'https://arns-handover-service-preprod.hmpps.service.justice.gov.uk'
    TOKEN_VERIFICATION_API_URL: 'https://token-verification-api-preprod.prison.service.justice.gov.uk'
    AAP_API_URL: 'https://arns-assessment-platform-api-preprod.hmpps.service.justice.gov.uk'
    COORDINATOR_API_URL: 'https://arns-coordinator-api-preprod.hmpps.service.justice.gov.uk'
    DELIUS_API_URL: 'https://sentence-plan-and-delius-preprod.hmpps.service.justice.gov.uk'
    ARNS_API_URL: 'https://assess-risks-and-needs-preprod.hmpps.service.justice.gov.uk'
    SAN_URL: 'https://strengths-based-needs-assessments-preprod.hmpps.service.justice.gov.uk'
    OASYS_URL: 'https://pp.oasys.service.justice.gov.uk'
    MPOP_URL: 'https://manage-people-on-probation-preprod.hmpps.service.justice.gov.uk'
    FEATURE_FLAG_URL: 'https://feature-toggles-preprod.hmpps.service.justice.gov.uk'
    ENVIRONMENT_NAME: PRE-PRODUCTION
    AUDIT_ENABLED: 'true'
    FEEDBACK_FORM_URL: 'https://forms.office.com/Pages/ResponsePage.aspx?id=KEeHxuZx_kGp4S6MNndq2NZZrIGKlVRMlQWYqMMLQ_ZUQU4xRlA2RTQ0UFlXV1lJWjRPRlVSRE5LOS4u'
    SERVICE_NOW_FORM_URL: 'https://mojprod.service-now.com/moj_sp?id=sc_cat_item&sys_id=276572591bce4910a93242ead34bcb53'
    FORM_TRAINING_SESSION_LAUNCHER_ENABLED: 'true'

generic-prometheus-alerts:
  targetApplication: hmpps-arns-assessment-platform-ui
  alertSeverity: hmpps-arns-assessment-platform-preprod
  businessHoursOnly: true
