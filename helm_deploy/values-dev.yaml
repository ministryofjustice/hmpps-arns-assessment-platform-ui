---
# Per environment values which override defaults in hmpps-arns-assessment-platform-ui/values.yaml

generic-service:
  ingress:
    host: arns-assessment-platform-dev.hmpps.service.justice.gov.uk
    className: modsec-non-prod
    modsecurity_enabled: true
    modsecurity_audit_enabled: true
    modsecurity_snippet: |
      SecRuleEngine On
      # Team here grants access to the OpenSearch logs to delve into the cause of the blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-assessments,tag:namespace={{ .Release.Namespace }}"
      # Rule 920272 (unusual characters) false-alarms on normal post bodies; skip the raw body for this check only.
      SecRuleUpdateTargetById 920272 "!REQUEST_BODY"
      # Practitioner free-text in sentence-plan forms (goals, steps, notes) can false-block; skip those checks on these pages only.
      SecRule REQUEST_URI "@beginsWith /sentence-plan/" "id:10010,phase:1,pass,nolog,ctl:ruleRemoveTargetByTag=attack-rce;ARGS,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS,ctl:ruleRemoveTargetByTag=attack-injection-php;ARGS,ctl:ruleRemoveTargetByTag=attack-injection-generic;ARGS"
      # Random sign-in tokens (code/state) can false-block; skip those checks on the sign-in routes only.
      SecRule REQUEST_URI "@beginsWith /sign-in/" "id:10020,phase:1,pass,nolog,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS,ctl:ruleRemoveTargetByTag=attack-rce;ARGS"
      SecRule REQUEST_URI "@beginsWith /oauth2/" "id:10021,phase:1,pass,nolog,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS,ctl:ruleRemoveTargetByTag=attack-rce;ARGS"
      # Random cookie values (analytics ai_*, login session) can false-block a user on every page; skip these cookies only.
      SecRuleUpdateTargetByTag "attack-rce" "!REQUEST_COOKIES:ai_user|!REQUEST_COOKIES:ai_session|!REQUEST_COOKIES:hmpps-arns-assessment-platform-ui.session"
      SecRuleUpdateTargetByTag "attack-sqli" "!REQUEST_COOKIES:ai_user|!REQUEST_COOKIES:ai_session|!REQUEST_COOKIES:hmpps-arns-assessment-platform-ui.session"
      SecRuleUpdateTargetByTag "attack-lfi" "!REQUEST_COOKIES:ai_user|!REQUEST_COOKIES:ai_session|!REQUEST_COOKIES:hmpps-arns-assessment-platform-ui.session"
      # Change default denial to be a 406 so that we can tell easily that it is modsecurity doing the blocking
      SecRuleUpdateActionById 949110 "deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "deny,status:406,logdata:%{SERVER_NAME}"
      SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"

  env:
    INGRESS_URL: 'https://arns-assessment-platform-dev.hmpps.service.justice.gov.uk'
    HMPPS_AUTH_URL: 'https://sign-in-dev.hmpps.service.justice.gov.uk/auth'
    HMPPS_ARNS_HANDOVER_URL: 'https://arns-handover-service-dev.hmpps.service.justice.gov.uk'
    TOKEN_VERIFICATION_API_URL: 'https://token-verification-api-dev.prison.service.justice.gov.uk'
    AAP_API_URL: 'https://arns-assessment-platform-api-dev.hmpps.service.justice.gov.uk'
    COORDINATOR_API_URL: 'https://arns-coordinator-api-dev.hmpps.service.justice.gov.uk'
    DELIUS_API_URL: 'https://sentence-plan-and-delius-dev.hmpps.service.justice.gov.uk'
    ARNS_API_URL: 'https://assess-risks-and-needs-dev.hmpps.service.justice.gov.uk'
    SAN_URL: 'https://strengths-based-needs-assessments-dev.hmpps.service.justice.gov.uk'
    OASYS_URL: 'https://arns-assessment-platform-dev.hmpps.service.justice.gov.uk/training-session-launcher/sessions'
    MPOP_URL: 'https://manage-people-on-probation-dev.hmpps.service.justice.gov.uk'
    FEATURE_FLAG_URL: 'https://feature-toggles-dev.hmpps.service.justice.gov.uk'
    SERVICE_NOW_FORM_URL: '#service-now-link'
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: 'true'
    FORM_TRAINING_SESSION_LAUNCHER_ENABLED: 'true'
    SMART_SURVEY_POPUP_CODE: 'XF5PNV'

generic-prometheus-alerts:
  targetApplication: hmpps-arns-assessment-platform-ui
  alertSeverity: hmpps-arns-assessment-platform-dev
  businessHoursOnly: true
